name: Daily market prediction run

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    environment: market-predictions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy matplotlib

      - name: Run script
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: |
          python "fxbias-backtest-calibration-8pairs-20days-mastertable-v5.5.py"

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: daily-output
          path: |
            *.pdf
            *.zip
            */
          if-no-files-found: warn
          retention-days: 7
